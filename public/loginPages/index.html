<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Login - Raridade Store</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

<style>

body {
    background: #f6f7fb;
    font-family: Arial, Helvetica, sans-serif;
}

/* CONTAINER */
.login-wrapper {
    min-height: 100vh;
    display: flex;
}

/* IMAGEM */
.login-left {
    flex: 1;
    background: url("../assents/mod.jpg") center/cover no-repeat;
    position: relative;
}

.login-left::after {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.45);
}

.login-left-content {
    position: relative;
    z-index: 2;
    color: #fff;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 60px;
}

.login-left h1 {
    font-size: 42px;
    font-weight: bold;
}

/* FORM */
.login-right {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 30px;
}

.login-card {
    width: 100%;
    max-width: 420px;
    background: #fff;
    padding: 35px;
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

/* LOGO */
.logo {
    text-align: center;
    margin-bottom: 20px;
}

.logo img {
    height: 50px;
}

/* INPUT */
.form-control {
    border-radius: 10px;
    padding: 12px;
}

/* BOTÃO LOGIN */
.btn-login {
    width: 100%;
    border-radius: 10px;
    padding: 12px;
    background: #000;
    color: #fff;
    border: none;
    margin-top: 10px;
    font-weight: 500;
}

.btn-login:hover {
    background: #222;
}

/* BOTÃO GOOGLE PADRONIZADO */
.btn-google {
    width: 100%;
    border-radius: 10px;
    padding: 12px;
    background: #fff;
    color: #333;
    border: 1px solid #ddd;
    margin-top: 10px;

    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;

    font-weight: 500;
    transition: 0.2s;
}

.btn-google:hover {
    background: #f5f5f5;
}

/* PASSWORD */
.password-group .form-control {
    border-right: 0;
    box-shadow: none !important;
}

.password-group .btn {
    border-left: 0;
    background: #fff;
}

.password-group .btn:hover {
    background: #f2f2f2;
}

/* LINKS */
.small-links {
    text-align: center;
    margin-top: 15px;
    font-size: 14px;
}

/* RESPONSIVO */
@media (max-width: 768px) {

    .login-wrapper {
        flex-direction: column;
    }

    .login-left {
        display: none;
    }

    .login-right {
        width: 100%;
        min-height: 100vh;
        padding: 0;
        display: flex;
        align-items: stretch;
        justify-content: center;
    }

    .login-card {
        width: 100%;
        height: 100vh;
        max-width: 100%;
        border-radius: 0;
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: 30px;
    }
}

</style>
</head>

<body>

<div class="login-wrapper">

    <!-- LEFT -->
    <div class="login-left">
        <div class="login-left-content">
            <h1>Raridade Store</h1>
            <p>Moda streetwear premium com identidade.</p>
        </div>
    </div>

    <!-- RIGHT -->
    <div class="login-right">

        <div class="login-card">

            <div class="logo">
                <img src="../assents/RARIDADE-STORE.png">
            </div>

            <h4 class="text-center mb-4">Entrar na conta</h4>

            <form onsubmit="login(event)">

                <input type="email" id="email" class="form-control mb-3" placeholder="Email" required>

                <!-- PASSWORD -->
                <div class="input-group mb-3 password-group">

                    <input type="password"
                        id="password"
                        class="form-control"
                        placeholder="Senha"
                        required>

                    <button class="btn border d-flex align-items-center justify-content-center"
                            type="button"
                            onclick="togglePassword()"
                            style="width: 48px;">

                        <i class="bi bi-eye fs-5" id="eyeIcon"></i>

                    </button>

                </div>

                <!-- LOGIN -->
                <button type="submit" class="btn-login">
                    Entrar
                </button>

                <!-- GOOGLE -->
                <button type="button"
                        class="btn-google"
                        onclick="loginGoogle()">

                    <i class="bi bi-google"></i>
                    Entrar com Google

                </button>

            </form>

            <div class="small-links">
                <p>Não tem conta? <a href="../registrePages/index.html">Criar conta</a></p>
            </div>

        </div>

    </div>

</div>

<script>

const API = "http://192.168.1.105:8008";

/* LOGIN */
async function login(event) {
    event.preventDefault();

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    try {

        const res = await fetch(`${API}/auth/login`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (!res.ok) {
            alert(data.error || "Erro ao fazer login");
            return;
        }

        if (data.token) {

            localStorage.setItem("token", data.token);
            localStorage.setItem("user", JSON.stringify(data.usuario));

            if (data.usuario.role === "ADMIN") {
                window.location.href = "../adminPages/index.html";
            } else {
                window.location.href = "../index.html";
            }
        }

    } catch (err) {
        console.error(err);
        alert("Erro ao conectar com o servidor.");
    }
}

/* TOGGLE PASSWORD */
function togglePassword() {
    const input = document.getElementById("password");
    const icon = document.getElementById("eyeIcon");

    if (input.type === "password") {
        input.type = "text";
        icon.classList.replace("bi-eye", "bi-eye-slash");
    } else {
        input.type = "password";
        icon.classList.replace("bi-eye-slash", "bi-eye");
    }
}

/* GOOGLE LOGIN */
function loginGoogle() {
    window.location.href = `${API}/auth/google`;
}

</script>

</body>
</html>

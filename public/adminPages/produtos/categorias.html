<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Categorias</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<style>
body { background:#f5f6fa; font-family:Arial; }
.card-box {
  background:#fff;
  border-radius:15px;
  padding:25px;
  box-shadow:0 5px 20px rgba(0,0,0,.05);
}
.item-cat {
  border:1px solid #eee;
  padding:10px;
  border-radius:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:10px;
  transition:.2s;
}
.item-cat:hover { background:#f9f9f9; }
</style>
</head>
<body>
<div class="container py-5">
  <a href="./index.html" class="btn btn-outline-dark mb-3">← Voltar</a>
  <div class="row g-4">

    <!-- CREATE -->
    <div class="col-md-4">
      <div class="card-box">
        <h5 class="mb-3">➕ Nova Categoria</h5>
        <form onsubmit="createCategory(event)">
          <input id="name" class="form-control mb-2" placeholder="Nome da categoria">
          <select id="parentId" class="form-control mb-2">
            <option value="">Categoria raiz</option>
          </select>
          <button class="btn btn-dark w-100">Salvar</button>
        </form>
      </div>
    </div>

    <!-- LIST -->
    <div class="col-md-8">
      <div class="card-box">
        <h5 class="mb-3">📋 Categorias</h5>
        <div id="list">Carregando...</div>
      </div>
    </div>

  </div>
</div>

<script>
const API = "http://192.168.1.100:8008";
const token = localStorage.getItem("token");

/* =========================
   CREATE CATEGORY
========================= */
async function createCategory(e) {
  e.preventDefault();
  const name = document.getElementById("name").value.trim();
  const parentId = document.getElementById("parentId").value;

  if (!name) { alert("Digite o nome da categoria"); return; }

  try {
    const res = await fetch(`${API}/categories`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${token}`
      },
      body: JSON.stringify({ name, parentId: parentId || null })
    });
    const data = await res.json();
    if (!res.ok) { alert(data.error || "Erro ao criar categoria"); return; }

    document.getElementById("name").value = "";
    document.getElementById("parentId").value = "";
    loadCategories();
  } catch (err) {
    alert("Erro de conexão");
  }
}

/* =========================
   DELETE CATEGORY
========================= */
async function deleteCategory(id) {
  if (!confirm("Deseja apagar esta categoria?")) return;
  try {
    const res = await fetch(`${API}/categories/${id}`, {
      method: "DELETE",
      headers: { "Authorization": `Bearer ${token}` }
    });
    const data = await res.json();
    if (!res.ok) { alert(data.error || "Erro ao apagar categoria"); return; }
    loadCategories();
  } catch (err) {
    alert("Erro de conexão");
  }
}

/* =========================
   FLATTEN (lista aninhada → flat)
========================= */
function flattenCategories(categories) {
  const result = [];
  const seen = new Set();

  function walk(list) {
    list.forEach(cat => {
      if (!seen.has(cat.id)) {
        seen.add(cat.id);
        result.push({ id: cat.id, name: cat.name, parentId: cat.parentId || null });
      }
      if (cat.children && cat.children.length > 0) walk(cat.children);
    });
  }

  walk(categories);
  return result;
}
/* =========================
   RENDER TREE
========================= */
function renderCategories(flat, parentId = null, level = 0) {
  return flat
    .filter(cat => cat.parentId === parentId)
    .map(cat => `
      <div class="item-cat" style="margin-left:${level * 20}px">
        <span>${"—".repeat(level)} ${cat.name}</span>
        <button class="btn btn-sm btn-outline-danger" onclick="deleteCategory('${cat.id}')">
          <i class="bi bi-trash"></i>
        </button>
      </div>
      ${renderCategories(flat, cat.id, level + 1)}
    `).join("");
}

/* =========================
   LOAD CATEGORIES
========================= */
async function loadCategories() {
  const el = document.getElementById("list");
  try {
    const res = await fetch(`${API}/categories`, {
      headers: { "Authorization": `Bearer ${token}` }
    });
    const data = await res.json();

    if (!Array.isArray(data)) { el.innerHTML = "Erro ao carregar categorias"; return; }
    if (data.length === 0) { el.innerHTML = "<p class='text-muted'>Nenhuma categoria cadastrada</p>"; return; }

    const flat = flattenCategories(data);

    // Popula o select de pai
    const select = document.getElementById("parentId");
    select.innerHTML = `<option value="">Categoria raiz</option>` +
      flat.map(cat => `<option value="${cat.id}">${cat.name}</option>`).join("");

    // Renderiza a árvore
    el.innerHTML = renderCategories(flat);
  } catch (err) {
    console.error(err);
    el.innerHTML = "Erro ao carregar categorias";
  }
}

/* INIT */
loadCategories();
</script>
</body>
</html>

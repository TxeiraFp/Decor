<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Raridade Store - Admin</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

<style>

body{
    background:#f4f6fb;
    font-family: Arial, Helvetica, sans-serif;
}

/* TOPBAR */
.topbar{
    background:#fff;
    padding:14px 20px;
    border-bottom:1px solid #e9ecef;
    display:flex;
    justify-content:space-between;
    align-items:center;
    position:sticky;
    top:0;
    z-index:1000;
}

.logo{
    font-size:50px;
    font-weight:700;
    display:flex;
    align-items:center;
    gap:8px;
}

/* CONTAINER */
.container h2{
    font-weight:700;
}

/* CARD */
.card-admin{
    border:none;
    border-radius:18px;
    transition:.25s ease;
    background:#fff;
    height:100%;
}

.card-admin:hover{
    transform:translateY(-6px);
    box-shadow:0 12px 30px rgba(0,0,0,.08);
}

.card-body{
    padding:30px 20px;
}

.card-admin i{
    font-size:42px;
}

/* LINK */
a{
    text-decoration:none;
    color:inherit;
}

/* RESPONSIVO MELHORADO */
@media (max-width: 768px){

    .logo{
        font-size:18px;
    }

    .topbar button{
        font-size:14px;
        padding:6px 10px;
    }

    .card-body{
        padding:20px;
    }

    .card-admin i{
        font-size:36px;
    }

    h2{
        font-size:22px;
    }
}

</style>
</head>

<body>

<!-- TOPBAR -->
<div class="topbar">

    <div class="logo">
        🛍️ Raridade Admin
    </div>

    <button class="btn btn-danger btn-sm" onclick="logout()">
        <i class="bi bi-box-arrow-right"></i>
        Sair
    </button>

</div>

<!-- CONTENT -->
<div class="container py-4 py-md-5">

    <h2 class="mb-4">Painel Administrativo</h2>

    <div class="row g-4">

        <!-- PRODUTOS -->
        <div class="col-12 col-sm-6 col-lg-3">
            <a href="./produtos/index.html">
                <div class="card card-admin shadow-sm">
                    <div class="card-body text-center">

                        <i class="bi bi-box-seam text-primary"></i>
                        <h5 class="mt-3">Produtos</h5>
                        <p class="text-muted mb-0">Gerenciar produtos</p>

                    </div>
                </div>
            </a>
        </div>

        <!-- PEDIDOS -->
        <div class="col-12 col-sm-6 col-lg-3">
            <a href="./pedidos.html">
                <div class="card card-admin shadow-sm">
                    <div class="card-body text-center">

                        <i class="bi bi-bag-check text-success"></i>
                        <h5 class="mt-3">Pedidos</h5>
                        <p class="text-muted mb-0">Gerenciar pedidos</p>

                    </div>
                </div>
            </a>
        </div>

        <!-- USUÁRIOS -->
        <div class="col-12 col-sm-6 col-lg-3">
            <a href="./user.html">
                <div class="card card-admin shadow-sm">
                    <div class="card-body text-center">

                        <i class="bi bi-people text-warning"></i>
                        <h5 class="mt-3">Usuários</h5>
                        <p class="text-muted mb-0">Clientes cadastrados</p>

                    </div>
                </div>
            </a>
        </div>

        <!-- CONFIGURAÇÕES -->
        <div class="col-12 col-sm-6 col-lg-3">
            <a href="#">
                <div class="card card-admin shadow-sm">
                    <div class="card-body text-center">

                        <i class="bi bi-gear text-dark"></i>
                        <h5 class="mt-3">Configurações</h5>
                        <p class="text-muted mb-0">Ajustes da loja</p>

                    </div>
                </div>
            </a>
        </div>

    </div>
</div>

<script>

const token = localStorage.getItem("token");

if(!token){
    window.location.href="../loginPages/index.html";
}

function logout(){
    localStorage.removeItem("token");
    localStorage.removeItem("user");
    window.location.href="../index.html";
}

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>

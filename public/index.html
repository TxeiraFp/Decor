<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

<title>Raridade Store</title>

<style>

body {
    background: #fff;
    font-family: Arial, Helvetica, sans-serif;
}

/* HEADER */
.header-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 20px;
    border-bottom: 1px solid #eee;
}

.logo img {
    height: 62px;
}

/* ICONS */
.icons {
    display: flex;
    align-items: center;
    gap: 23px;
}

.icon {
    font-size: 26px;
    cursor: pointer;
}

/* CART */
.badge-cart {
    position: absolute;
    top: -6px;
    right: -10px;
    font-size: 10px;
}

/* SEARCH */
.search-area {
    padding: 42px 20px;
    display: flex;
    gap: 12px;
    border-bottom: 1px solid #eee;
}

.search-box {
    flex: 1;
}

.search-box input {
    border-radius: 25px;
}

/* FILTER */
.filters {
    display: flex;
    gap: 10px;
}

.filters .form-select {
    width: 140px;
    border-radius: 20px;
}

/* DROPDOWN */
.dropdown-menu {
    border-radius: 12px;
    border: 1px solid #eee;
}

/* ESTADO LOGIN */
.logged-only { display: none; }

body.logged-in .logged-only { display: block; }
body.logged-in .not-logged { display: none; }

/* MOBILE */
@media (max-width: 768px) {
    .search-area {
        flex-direction: column;
    }
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header-top">

    <div class="logo">
        <img src="./assents/RARIDADE-STORE.png">
    </div>

    <div class="icons">

        <!-- PERFIL -->
        <div class="dropdown">

            <i class="bi bi-person icon dropdown-toggle"
               data-bs-toggle="dropdown"></i>

            <ul class="dropdown-menu dropdown-menu-end">

                <li class="not-logged">
                    <a class="dropdown-item" href="./loginPages/index.html">🔐 Login</a>
                </li>

                <li class="not-logged">
                    <a class="dropdown-item" href="./registrePages/index.html">📝 Registrar</a>
                </li>

                <li class="logged-only">
                    <a class="dropdown-item" href="./perfilPages/perfil.html">👤 Meu Perfil</a>
                </li>

                <li class="logged-only"><hr></li>

                <li class="logged-only">
                    <a class="dropdown-item text-danger" href="#" onclick="logout()">
                        🚪 Sair
                    </a>
                </li>

            </ul>
        </div>

        <!-- CARRINHO -->
        <div class="position-relative">
            <i class="bi bi-cart icon"></i>
            <span class="badge bg-danger badge-cart">2</span>
        </div>

    </div>

</div>

<!-- SEARCH -->
<div class="search-area">

    <div class="search-box">
        <input class="form-control" placeholder="Buscar produtos...">
    </div>

    <div class="filters">
        <select class="form-select">
            <option>Categoria</option>
            <option>Masculino</option>
            <option>Feminino</option>
        </select>

        <select class="form-select">
            <option>Preço</option>
            <option>Menor</option>
            <option>Maior</option>
        </select>
    </div>

</div>

<!-- NAV -->
<nav class="navbar navbar-light bg-light">
    <div class="container justify-content-center">
        <a class="nav-link" href="#">Masculino</a>
        <a class="nav-link" href="#">Feminino</a>
        <a class="nav-link" href="#">Infantil</a>
        <a class="nav-link text-danger" href="#">Promoções</a>
    </div>
</nav>

<!-- SCRIPT LOGIN/API -->
<script>

const API = "http://localhost:8008";

/* checar login ao carregar */
function checkAuth() {
    const token = localStorage.getItem("token");

    if (token) {
        document.body.classList.add("logged-in");
    } else {
        document.body.classList.remove("logged-in");
    }
}

/* login real via API */
async function login(email, password) {

    const res = await fetch(`${API}/session`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    if (data.token) {
        localStorage.setItem("token", data.token);
        localStorage.setItem("user", JSON.stringify(data.usuario));

        document.body.classList.add("logged-in");

        alert("Login OK");
        location.reload();
    } else {
        alert("Erro login");
    }
}

/* logout */
function logout() {
    localStorage.removeItem("token");
    localStorage.removeItem("user");

    document.body.classList.remove("logged-in");

    location.reload();
}

checkAuth();

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
